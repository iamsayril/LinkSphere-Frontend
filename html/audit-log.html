<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/audit-log.css" />
</head>
<body>
  <header class="topbar">
    <button class="menu-btn" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <h1>AUDIT LOG</h1>
  </header>

  <main class="audit-page" id="audit-page">
    <div id="audit-loading" style="text-align:center;padding:60px 0;font-size:13px;font-weight:700;letter-spacing:0.1em;opacity:0.4;">
      LOADING AUDIT LOG...
    </div>
    <div id="audit-workspace-select" style="display:none;margin-bottom:32px;">
      <select id="workspace-select" style="
        width:100%;height:48px;border:2px solid #000;
        background:#fff;font-family:Inter,Arial,sans-serif;
        font-size:14px;font-weight:700;padding:0 14px;
        outline:none;cursor:pointer;
      ">
        <option value="">Select a workspace...</option>
      </select>
    </div>
    <div id="audit-content"></div>
  </main>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<script src="../js/audit-log.js"></script>
<script src="../js/call-handler.js"></script>
</body>
</html>
