<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Linksphere</title>
  <link rel="stylesheet" href="../css/notification.css" />
</head>
<body>

  <!-- ─── Sidebar Overlay ──────────────────────────────────────────── -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ─── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">✣</div>
        <span>LINKSPHERE</span>
      </div>
      <button class="sidebar-close" id="sidebar-close" aria-label="Close menu">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <line x1="1" y1="1" x2="17" y2="17" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"/>
          <line x1="17" y1="1" x2="1" y2="17" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebar-avatar">?</div>
      <div>
        <p class="sidebar-user-name" id="sidebar-user-name">Loading...</p>
        <p class="sidebar-user-role">Member</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <p class="sidebar-nav-label">NAVIGATION</p>

      <a class="sidebar-link" href="interface.html" id="nav-start">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
        </span>
        <span>Dashboard</span>
      </a>

      <a class="sidebar-link active" href="notification.html" id="nav-notif">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
        </span>
        <span>Notifications</span>
        <span class="sidebar-badge" id="sidebar-notif-badge" style="display:none;">0</span>
      </a>

      <a class="sidebar-link" href="workspace.html" id="nav-workspace">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
        </span>
        <span>Workspace</span>
      </a>
    </nav>

    <div class="sidebar-divider"></div>

    <nav class="sidebar-nav">
      <p class="sidebar-nav-label">ACCOUNT</p>

      <a class="sidebar-link" href="profile.html" id="nav-profile">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </span>
        <span>Profile</span>
      </a>

      <a class="sidebar-link sidebar-link-danger" href="#" id="nav-logout">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </span>
        <span>Logout</span>
      </a>
    </nav>

    <div class="sidebar-footer">© 2025 LINKSPHERE</div>
  </aside>

  <!-- ─── Top Bar ──────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" id="menu-btn" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="topbar-brand brand">
        <div class="brand-icon">✣</div>
        <h1>NOTIFICATIONS</h1>
      </div>
      <span class="unread-badge" id="unread-badge" style="display:none;">0</span>
    </div>
    <div class="topbar-right">
      <button class="topbar-action-btn" id="mark-all-btn">Mark All Read</button>
      <button class="topbar-action-btn danger" id="clear-all-btn">Clear All</button>
    </div>
  </header>

  <!-- ─── Main Content ─────────────────────────────────────────────── -->
  <main class="page">
    <div class="page-grid">

      <!-- Left: Live Feed -->
      <section>
        <div class="section-heading">
          <h2>Live Feed</h2>
          <span>Real-time updates</span>
        </div>

        <div class="filter-bar">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="unread">Unread</button>
        </div>

        <div class="notif-list" id="notif-list">
          <div class="notif-spinner-wrap">
            <div class="notif-spinner"></div>
          </div>
        </div>
      </section>

      <!-- Right: Notification Controls -->
      <section class="notif-control">
        <div class="section-heading">
          <h2>Settings</h2>
          <span>Preferences</span>
        </div>

        <div class="push-card">
          <div>
            <h3>Push Alerts</h3>
            <p>System-level critical alerts.</p>
          </div>
          <button class="switch active" id="pushSwitch" aria-label="Toggle push alerts">
            <span></span>
          </button>
        </div>

        <div class="muted-card">
          <div class="muted-head">
            <span>Muted Channels</span>
            <span class="muted-count" id="activeCount">0</span>
          </div>
          <div id="muted-channels-list"></div>
          <button class="add-channel-btn" id="add-mute-btn">+ Add Channel to Mute List</button>
        </div>
      </section>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="../js/notification.js"></script>
</body>
</html>
