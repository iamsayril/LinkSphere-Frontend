<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Linksphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/notification.css" />
</head>
<body>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Burger Sidebar -->
  <aside class="burger-sidebar" id="burger-sidebar">
    <div class="burger-sidebar-header">
      <span class="burger-sidebar-logo">✣</span>
      <span class="burger-sidebar-title">LINKSPHERE</span>
      <button class="burger-close-btn" id="burger-close-btn">✕</button>
    </div>
    <nav class="burger-nav">
      <button class="burger-nav-item" onclick="window.location.href='workspace.html'">
        <span class="burger-nav-icon">💬</span>
        <span>Workspace</span>
      </button>
      <button class="burger-nav-item" onclick="window.location.href='messages.html'">
        <span class="burger-nav-icon">✉</span>
        <span>Messages</span>
      </button>
      <button class="burger-nav-item active">
        <span class="burger-nav-icon">🔔</span>
        <span>Notifications</span>
      </button>
      <button class="burger-nav-item" onclick="window.location.href='profile.html'">
        <span class="burger-nav-icon">👤</span>
        <span>Profile</span>
      </button>
    </nav>
  </aside>

  <div class="app-shell">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="burger-btn" id="burger-btn">
          <span></span><span></span><span></span>
        </button>
        <h1 class="topbar-title">NOTIFICATIONS</h1>
        <span class="unread-badge" id="unread-badge" style="display:none;">0</span>
      </div>
      <div class="topbar-right">
        <button class="topbar-action-btn" id="mark-all-btn" title="Mark all as read">✓ ALL READ</button>
        <button class="topbar-action-btn danger" id="clear-all-btn" title="Clear all">🗑 CLEAR</button>
      </div>
    </header>

    <!-- Page Body -->
    <div class="page-body">

      <!-- Left: Live Feed -->
      <section class="feed-section">
        <div class="section-title">
          <h2>LIVE FEED</h2>
          <span>Real-time updates</span>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-bar">
          <button class="filter-tab active" data-filter="all">ALL</button>
          <button class="filter-tab" data-filter="unread">UNREAD</button>
        </div>

        <main class="notif-list" id="notif-list">
          <div class="notif-spinner-wrap" id="notif-spinner">
            <div class="notif-spinner"></div>
          </div>
        </main>
      </section>

      <!-- Right: Notification Control -->
      <section class="notif-control">
        <div class="section-title">
          <h2>NOTIFICATION<br>CONTROL</h2>
          <span>Preferences</span>
        </div>

        <div class="push-card">
          <div>
            <h3>Push Alerts</h3>
            <p>System-level critical alerts.</p>
          </div>
          <button class="switch active" id="pushSwitch" aria-label="toggle push alerts"><span></span></button>
        </div>

        <div class="muted-card">
          <div class="muted-head">
            <span>Muted Channels</span>
            <span id="activeCount">0 Muted</span>
          </div>
          <div id="muted-channels-list"></div>
          <button class="add-channel" id="add-mute-btn">+ Add Channel To Mute List</button>
        </div>

      </section>

    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="../js/notification.js"></script>
</body>
</html>
