<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linksphere - Interface</title>
  <link rel="stylesheet" href="../css/interface.css?v=2" />
</head>
<body>

  <!-- ─── Sidebar Overlay ──────────────────────────────────────────── -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ─── Sidebar ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">✣</div>
        <span>LINKSPHERE</span>
      </div>
      <button class="sidebar-close" id="sidebar-close" aria-label="Close menu">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <line x1="1" y1="1" x2="17" y2="17" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"/>
          <line x1="17" y1="1" x2="1" y2="17" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-user" id="sidebar-user">
      <div class="sidebar-avatar" id="sidebar-avatar">?</div>
      <div class="sidebar-user-info">
        <p class="sidebar-user-name" id="sidebar-user-name">Loading...</p>
        <p class="sidebar-user-role">Member</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <p class="sidebar-nav-label">NAVIGATION</p>

      <a class="sidebar-link active" href="#" id="nav-start">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
        </span>
        <span>Dashboard</span>
      </a>

      <a class="sidebar-link" href="#" id="nav-notif">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
        </span>
        <span>Notifications</span>
        <span class="sidebar-badge">3</span>
      </a>

      <a class="sidebar-link" href="messages.html" id="nav-messages">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </span>
        <span>Messages</span>
      </a>

      <a class="sidebar-link" href="workspace.html" id="nav-workspace">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
        </span>
        <span>Workspace</span>
      </a>
    </nav>

    <div class="sidebar-divider"></div>

    <nav class="sidebar-nav sidebar-nav-bottom">
      <p class="sidebar-nav-label">ACCOUNT</p>

      <a class="sidebar-link" href="profile.html" id="nav-profile">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </span>
        <span>Profile</span>
      </a>

      <a class="sidebar-link sidebar-link-danger" href="#" id="nav-logout">
        <span class="sidebar-link-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </span>
        <span>Logout</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      © 2026 LINKSPHERE
    </div>

  </aside>

  <!-- ─── Top Bar ──────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="left-header">
      <button class="menu-btn" id="menu-btn" aria-label="Open menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="brand">
        <div class="brand-icon">✣</div>
        <h1>LINKSPHERE</h1>
      </div>
    </div>
  </header>

  <!-- ─── Main Content ─────────────────────────────────────────────── -->
  <main class="page">

    <section class="hero reveal">
      <span class="tag">NEW CONNECTION</span>
      <h2>
        WELCOME TO<br />
        <strong>LINKSPHERE.</strong><br />
        LET'S GET STARTED.
      </h2>
      <div class="underline"></div>
    </section>

    <section class="cards">
      <button class="action-card reveal" id="create-workspace-btn">
        <div class="card-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
        <h3>Create a<br />Workspace</h3>
        <p>Start fresh and invite your team to collaborate in a new workspace.</p>
        <span class="join-link">Create Now →</span>
      </button>

      <button class="action-card reveal" id="join-workspace-btn">
        <div class="card-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
            <path d="M15 3h6v6"/><path d="M21 3L9 15"/><path d="M18 13v6H6V7h6"/>
          </svg>
        </div>
        <h3>Join a<br />Workspace</h3>
        <p>Already have a team? Enter an invite code to jump right in.</p>
        <span class="join-link">Join Now →</span>
      </button>
    </section>

    <section class="features reveal">
      <div class="feature">
        <span class="feature-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </span>
        <p>High Performance Hubs</p>
      </div>
      <div class="feature">
        <span class="feature-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
            <rect x="3" y="11" width="18" height="11" rx="0"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </span>
        <p>Enterprise Security</p>
      </div>
      <div class="feature">
        <span class="feature-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
          </svg>
        </span>
        <p>Real-Time Sync</p>
      </div>
    </section>

  </main>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <script src="../js/interface.js"></script>
  <script src="../js/call-handler.js"></script>
</body>
</html>
